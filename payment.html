<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="https://cloudflare.com" />
  </head>
  <body>
    <section id="payment" class="payment">
      <div class="content-left5">
        <div class="title"><a href="index.html">Checkout</a></div>
        <div class="contact-detail">
          <div class="contact">Contact Details</div>
          <div class="form-group">
            <label class="form-label">Email ID</label>
            <input
              class="form-input"
              type="email"
              placeholder="Enter Your Email"
            />
          </div>
        </div>
        <br />
        <div class="section-title">Payment</div>
        <div class="pay-option">
          <div class="payment-tab">
            <div class="pay-options">
              <input type="radio" name="payment-tab" id="tab-card" checked />
              <label class="tab-label label-card" for="tab-card"> Card </label>

              <input type="radio" name="payment-tab" id="tab-crypto" />
              <label class="tab-label label-crypto" for="tab-crypto">
                Crypto
              </label>

              <input type="radio" name="payment-tab" id="tab-bank" />
              <label class="tab-label label-bank" for="tab-bank"> Bank </label>

              <label class="tab-label tab-more"> ... </label>
            </div>
            <div class="card-details">
              <div class="form-group">
                <label class="form-label">Card Number</label>
                <input
                  class="form-input"
                  type="number"
                  placeholder="xxxx xxxx xxxx xxxx"
                  maxlength="19"
                />
              </div>
              <div class="form-row1">
                <div class="form-group">
                  <label class="form-label">Expiry</label>
                  <input
                    class="form-input"
                    type="number"
                    placeholder="MM/YY"
                    maxlength="5"
                  />
                </div>
                <div class="form-group">
                  <label class="form-label">CVC</label>
                  <input
                    class="form-input"
                    type="password"
                    placeholder="..."
                    maxlength="5"
                  />
                </div>
              </div>
              <div class="form-row2">
                <div class="form-group">
                  <label class="form-label">Country</label>
                  <select class="form-select">
                    <option></option>
                    <option>India</option>
                    <option>USA</option>
                    <option>UK</option>
                    <option>Canada</option>
                    <option>Australia</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">ZIP</label>
                  <input
                    class="form-input"
                    type="text"
                    placeholder="xxxxxx"
                    maxlength="8"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="content-right5">
        <div class="section-title1">Order Summary</div>
        <div class="right5">
          <p>Enter Coupon Code</p>
          <div class="coupon">
            <input type="text" placeholder="Coupon Code" />
            <a href="#x">Apply Coupon</a>
          </div>
          <div class="total-amt">
            <div class="summary">
              <div class="summary-row">
                <span>Sub Total</span>
                <span>₹6,200</span>
              </div>
              <div class="summary-row">
                <span>Taxes(If Applicable)</span>
                <span>₹199</span>
              </div>
              <div class="summary-row">
                <span>Discount</span>
                <span>₹0</span>
              </div>
              <div class="total">
                <span>Total</span>
                <span>₹6,499</span>
              </div>
            </div>
          </div>
          <hr />
          <div class="pay">
            <a href="#payment"><button>Pay Now ₹6,499</button></a>
          </div>
          <div class="pay-opt">
            <div class="secure">
              <img src="images/se.png" style="width: 100px" />
            </div>
            <div class="razorpay">
              <img src="images/razorpay.png" style="width: 100px" />
            </div>
            <div class="se-pay">
              <img src="images/payment-protect.png" style="width: 100px" />
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
